{{ define "main" }}
    <h1>{{ .Title }}</h1>

    <div>
        {{ range .Pages }}
            <article>
                <header>
                    <h2>
                        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                    </h2>
                </header>
            </article>

            <p>{{ .Summary }}</p>
        {{ end }}
    </div>
{{ end }}
